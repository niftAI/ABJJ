name: ABJJ WIN

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch: 

jobs:
  build-ubuntu:
    name: Build windows
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libtool autotools-dev automake pkg-config bsdmainutils python3
        sudo apt install build-essential libtool autotools-dev automake pkg-config bsdmainutils curl git
        sudo apt install nsis
        sudo apt install g++-mingw-w64-x86-64-posix
        sudo update-alternatives --config x86_64-w64-mingw32-g++ # Set the default mingw32 g++ compiler option to posix.
        
    - name: Workaround for broken GMP download URL
      run: |
        mkdir -p depends/sources
        curl -L "https://ftp.gnu.org/gnu/gmp/gmp-6.1.2.tar.xz" -o depends/sources/gmp-6.1.2.tar.xz
      
    - name: Install Core & Crypto Dependencies
      run: |
        cd depends 
        sudo chmod -R 777 .
        sudo make HOST=x86_64-w64-mingw32 -j$(nproc)
   
    - name: Run Autogen
      run: ./autogen.sh

    - name: Configure Build
      run: ./configure --prefix=`pwd`/depends/x86_64-w64-mingw32

    - name: Compile
      run: make -j$(nproc)

    - name: Run Tests (Optional)
      run: make check

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: bitcoin2-ubuntu-20.04-binaries
        path: |
          src/uiddd.exe
          src/uidd-cli.exe
          src/uidd-tx.exe
          src/qt/uidd-qt.exe
