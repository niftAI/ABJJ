name: ABJJ LINUX

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch: 

jobs:
  build-ubuntu:
    name: Build on Ubuntu 20.04
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Cache depends
      uses: actions/cache@v4
      id: depends-cache
      with:
        path: |
          depends/sources
          depends/built
          depends/x86_64-pc-linux-gnu
        # Use a specific key for Linux to avoid mixing with Windows
        key: ${{ runner.os }}-depends-linux-${{ hashFiles('depends/packages/*.mk') }}
        restore-keys: |
          ${{ runner.os }}-depends-linux-

    - name: Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libtool autotools-dev automake pkg-config bsdmainutils python3
        
    - name: Workaround for broken GMP download URL
      # Only download if cache missed
      if: steps.depends-cache.outputs.cache-hit != 'true'
      run: |
        mkdir -p depends/sources
        curl -L "https://ftp.gnu.org/gnu/gmp/gmp-6.1.2.tar.xz" -o depends/sources/gmp-6.1.2.tar.xz
      
    - name: Install and Set GCC 9 as Default
      run: |
        sudo apt-get install -y gcc-9 g++-9
        
        # Set GCC 9 as the highest priority alternative
        sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-9 100
        sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-9 100
        
        # Verify the active version
        gcc --version
        g++ --version

    - name: Build Depends
      # -C depends tells make to run inside the depends folder without needing cd
      # HOST is explicitly set for Linux
      run: sudo chmod -R 777 .

       make -C depends HOST=x86_64-pc-linux-gnu -j$(nproc)
        
    - name: Verify GMP Library
      run: ls -l depends/x86_64-pc-linux-gnu/lib/libgmp.a

    - name: Run Autogen
      run: ./autogen.sh

    - name: Configure Build (Linux)
      run: |
        # Define the path to your depends output
        DEP_PATH=$PWD/depends/x86_64-pc-linux-gnu
        
        # CONFIG_SITE MUST be at the beginning of the command
        # -lm is added to LIBS to satisfy Linux math library requirements for GMP
        CONFIG_SITE=${DEP_PATH}/share/config.site ./configure --prefix=$DEP_PATH \
                    --with-gui=qt5 \
                    LDFLAGS="-L${DEP_PATH}/lib" \
                    CPPFLAGS="-I${DEP_PATH}/include" \
                    LIBS="-lgmp -lm"
                    
    - name: Compile
      run: make -j$(nproc)

    - name: Run Tests (Optional)
      run: make check || true

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: abjj-ubuntu-20.04-binaries
        path: |
          src/abjjd
          src/abjj-cli
          src/abjj-tx
          src/qt/abjj-qt
