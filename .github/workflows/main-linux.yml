name: ABJJ LINUX

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch: 

jobs:
  build-ubuntu:
    name: Build on Ubuntu 22.04
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Cache depends
      uses: actions/cache@v4
      id: depends-cache
      with:
        path: |
          depends/sources
          depends/built
          depends/x86_64-pc-linux-gnu
        # Bumped cache version to v3 to ensure a completely clean slate for 22.04
        key: ${{ runner.os }}-depends-linux-v3-${{ hashFiles('depends/packages/*.mk') }}
        restore-keys: |
          ${{ runner.os }}-depends-linux-v3-

    - name: Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libtool autotools-dev automake pkg-config bsdmainutils python3 libgmp-dev
        
    - name: Install and Set GCC 10
      run: |
        sudo apt-get install -y gcc-10 g++-10
        sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-10 100
        sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-10 100
        gcc --version

    - name: Workaround for broken GMP download URL
      if: steps.depends-cache.outputs.cache-hit != 'true'
      run: |
        mkdir -p depends/sources
        curl -L "https://ftp.gnu.org/gnu/gmp/gmp-6.1.2.tar.xz" -o depends/sources/gmp-6.1.2.tar.xz

    - name: Build Depends
      run: make -C depends HOST=x86_64-pc-linux-gnu -j$(nproc)

    - name: Run Autogen
      run: ./autogen.sh

    - name: Configure Build (Linux)
      run: |
        DEP_PATH=$PWD/depends/x86_64-pc-linux-gnu
        
        # We add --disable-pie to prevent Ubuntu 22.04 from rejecting the static GMP library
        CONFIG_SITE=${DEP_PATH}/share/config.site ./configure \
          --prefix=$DEP_PATH \
          --with-gui=qt5 \
          --disable-pie \
          LDFLAGS="-L${DEP_PATH}/lib" \
          CPPFLAGS="-I${DEP_PATH}/include" \
          LIBS="-lgmp -lm" || { 
          
          echo "========================================="
          echo "CONFIGURE FAILED. DUMPING CONFIG.LOG:"
          echo "========================================="
          grep -A 50 "checking for __gmpn_sub_n in -lgmp" config.log
          exit 1
        }
                    
    - name: Compile
      run: make -j$(nproc)

    - name: Run Tests (Optional)
      run: make check || true

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: abjj-ubuntu-22.04-binaries
        path: |
          src/abjjd
          src/abjj-cli
          src/abjj-tx
          src/qt/abjj-qt
